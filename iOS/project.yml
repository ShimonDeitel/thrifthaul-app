name: Thrifthaul
options:
  bundleIdPrefix: com.shimondeitel.thrifthaul
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Thrifthaul:
    type: application
    platform: iOS
    sources:
      - path: Thrifthaul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thrifthaul
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Thrifthaul/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ThrifthaulTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ThrifthaulTests
      - path: Thrifthaul.storekit
    dependencies:
      - target: Thrifthaul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thrifthaul.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ThrifthaulUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ThrifthaulUITests
    dependencies:
      - target: Thrifthaul
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thrifthaul.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Thrifthaul:
    build:
      targets:
        Thrifthaul: all
        ThrifthaulTests: [test]
        ThrifthaulUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Thrifthaul.storekit
    test:
      config: Debug
      storeKitConfiguration: Thrifthaul.storekit
      targets:
        - ThrifthaulTests
        - ThrifthaulUITests
    archive:
      config: Release
