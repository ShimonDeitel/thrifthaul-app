<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Vendorbin - Thrift Store Haul Log</title>
<style>
  body { margin:0; background:#251A15; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { font-size:2.2rem; color:#8BC34A; margin-bottom:8px; }
  p.tagline { color:rgba(255,255,255,0.75); font-size:1.15rem; margin-bottom:32px; }
  .feature { background:rgba(255,255,255,0.06); border-radius:16px; padding:20px; margin:12px 0; text-align:left; }
  .feature b { color:#8BC34A; }
  footer { margin-top:48px; color:rgba(255,255,255,0.4); font-size:0.85rem; }
  a { color:#8BC34A; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8BC34A55 0%, #8BC34A00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Vendorbin - Thrift Store Haul Log</h1>
  <p class="tagline">Track what you spend and save shopping secondhand at thrift stores.</p>
  <div class="feature"><b>Free:</b> Log item, price, and estimated retail savings</div>
  <div class="feature"><b>Pro:</b> Total lifetime savings and per-store comparison ($2.99 one-time)</div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
